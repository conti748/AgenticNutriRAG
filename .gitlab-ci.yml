stages:
  - lint
  - test

default:
  image: python:3.12-slim
  before_script:
    - pip install uv
    - uv sync --all-groups

ruff:
  stage: lint
  script:
    - uv run ruff check .
    - uv run ruff format --check .

mypy:
  stage: lint
  script:
    - uv run mypy src

pytest:
  stage: test
  script:
    - uv run pytest -q
